name: Build Skills

on:
  push:
    paths:
      - 'skills/**'
      - 'packages/build/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'packages/build/**'

jobs:
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate SKILL.md files
        run: node packages/build/validate.js

  build:
    name: Build AGENTS.md & CLAUDE.md
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build skill index
        run: node packages/build/build.js

      - name: Commit generated files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md CLAUDE.md
          git diff --staged --quiet || git commit -m "chore: regenerate AGENTS.md and CLAUDE.md [skip ci]"
          git push
